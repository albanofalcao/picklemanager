<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cabo / Handle -->
  <rect x="28" y="42" width="8" height="18" rx="4" fill="#7c4a1e"/>
  <rect x="29.5" y="42" width="2" height="18" rx="1" fill="#a0622a" opacity="0.5"/>

  <!-- Corpo da raquete (paddle retangular com cantos arredondados — formato pickleball) -->
  <rect x="8" y="6" width="48" height="40" rx="10" fill="#e8892a"/>
  <!-- Borda do paddle -->
  <rect x="8" y="6" width="48" height="40" rx="10" fill="none" stroke="#c06818" stroke-width="2"/>

  <!-- Furos no paddle (honeycomb pattern — característica do pickleball) -->
  <!-- Linha 1 -->
  <circle cx="20" cy="16" r="3" fill="#c06818"/>
  <circle cx="32" cy="16" r="3" fill="#c06818"/>
  <circle cx="44" cy="16" r="3" fill="#c06818"/>
  <!-- Linha 2 (offset) -->
  <circle cx="26" cy="26" r="3" fill="#c06818"/>
  <circle cx="38" cy="26" r="3" fill="#c06818"/>
  <!-- Linha 3 -->
  <circle cx="20" cy="36" r="3" fill="#c06818"/>
  <circle cx="32" cy="36" r="3" fill="#c06818"/>
  <circle cx="44" cy="36" r="3" fill="#c06818"/>

  <!-- Bola de pickleball (amarela perfurada) ao lado -->
  <circle cx="54" cy="50" r="8" fill="#f5e642" stroke="#d4c500" stroke-width="1.5"/>
  <!-- Furos da bola -->
  <circle cx="51" cy="47" r="1.2" fill="#d4c500"/>
  <circle cx="57" cy="47" r="1.2" fill="#d4c500"/>
  <circle cx="54" cy="53" r="1.2" fill="#d4c500"/>
</svg>
